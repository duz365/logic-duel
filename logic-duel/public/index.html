<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>逻辑拼图 · 对抗推理</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0f14;
      color: #c8d6e5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
    }
    #app {
      width: 100%;
      max-width: 500px;
      background: #111922;
      border-radius: 20px;
      border: 1px solid #2a3a4a;
      padding: 20px 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-height: 95vh;
      overflow-y: auto;
    }
    .screen { display:none; flex-direction:column; gap:12px; width:100%; }
    .screen.active { display:flex; }
    h2 { text-align:center; font-weight:600; color:#7eb8da; font-size:1.3em; border-bottom:1px solid #2a3a4a; padding-bottom:8px; }
    h3 { color:#a0c4d8; font-size:1em; }
    input, button, select {
      background:#1a2632; border:1px solid #2e4456; border-radius:12px;
      padding:12px 16px; font-size:15px; color:#d0dde8; outline:none; width:100%;
    }
    input::placeholder { color:#5a7288; }
    button {
      background:#2a4a5e; font-weight:600; cursor:pointer; border:none;
      color:#e8f0f8; letter-spacing:0.5px;
    }
    button:active { background:#3a5f78; transform:scale(0.98); }
    button:disabled { background:#1a2a34; color:#4a5a68; cursor:not-allowed; opacity:0.6; }
    button.gold { background:#8b6914; border:2px solid #c49b4a; }
    button.danger { background:#5a2a2a; }
    button.success { background:#2a5a3a; }
    button.bot-btn { background:#3a4a6a; border:1px solid #5a6a8a; font-size:13px; }
    .card { background:#16202a; border-radius:14px; padding:14px; border:1px solid #253545; }
    .player-list { display:flex; flex-wrap:wrap; gap:6px; }
    .player-badge { background:#1e3040; border-radius:16px; padding:6px 14px; font-size:13px; }
    .player-badge.bot { background:#2a1a30; border:1px dashed #5a4a6a; color:#c0a0d0; }
    .messages { max-height:200px; overflow-y:auto; display:flex; flex-direction:column; gap:6px; background:#0d141c; border-radius:12px; padding:10px; font-size:13px; }
    .msg { background:#1a2834; border-radius:10px; padding:8px 12px; word-break:break-word; }
    .msg.system { background:#2a2018; color:#c8a860; font-style:italic; }
    .phase-badge { text-align:center; background:#1e3648; border-radius:12px; padding:8px; font-weight:bold; color:#b0d0e8; }
    .rule-item { background:#1a2838; border-radius:10px; padding:10px 14px; margin:4px 0; cursor:pointer; border:2px solid transparent; transition:all 0.2s; }
    .rule-item:hover { border-color:#4a6a8a; }
    .rule-item.selected { border-color:#c49b4a; background:#2a3020; cursor:default; }
    .rule-item.readonly { cursor:default; }
    .rule-item.readonly:hover { border-color:transparent; }
    .rule-item.submitted { opacity:0.5; cursor:default; pointer-events:none; }
    .my-rule-tag { display:inline-block; background:#1a2a38; border:1px solid #2e4456; border-radius:8px; padding:6px 10px; font-size:12px; margin:2px; }
    .btn-row { display:flex; gap:8px; flex-wrap:wrap; } .btn-row button { flex:1; min-width:70px; }
    select { background:#1a2632; color:#d0dde8; }
    .statement-board, .my-rules-board, .bot-panel, .vote-result-board, .vote-detail-board {
      background:#0d141c; border-radius:10px; padding:10px; margin-top:8px;
    }
    .bot-panel { border:1px dashed #3a4a5a; }
    .vote-result-board { border:1px solid #3a5a4a; }
    .vote-detail-board { border:1px solid #4a5a3a; }
    .statement-entry { padding:6px 0; border-bottom:1px solid #1e2a34; font-size:13px; }
    .statement-entry:last-child { border-bottom:none; }
    .collapsible-header { cursor:pointer; display:flex; justify-content:space-between; align-items:center; font-size:13px; color:#8a9ab0; padding:4px 0; }
    .collapsible-header:hover { color:#b0c0d0; }
    .collapsible-body { margin-top:6px; }
    .arrow { transition:transform 0.2s; display:inline-block; }
    .arrow.open { transform:rotate(90deg); }
    .warning-badge { background:#5a2a2a; border:1px solid #8b4a4a; border-radius:12px; padding:8px 12px; color:#e0a0a0; font-size:12px; text-align:center; margin-bottom:8px; }
    .player-rules-card { background:#0d141c; border-radius:8px; padding:8px; margin:4px 0; border-left:3px solid #2e4456; }
    .player-rules-card.false-holder { border-left-color:#8b4a4a; }
    .rule-detail { font-size:12px; padding:2px 0; color:#a0b0c0; }
    .rule-detail.false { color:#d08a8a; text-decoration:line-through; }
    .rule-detail.true { color:#8ab8a0; }
    .vote-bar { height:8px; border-radius:4px; background:#2e4456; margin:4px 0; overflow:hidden; }
    .vote-bar-fill { height:100%; border-radius:4px; background:#5a8a6a; }
    .vote-bar-fill.majority { background:#c49b4a; }
    .vote-result-row { display:flex; justify-content:space-between; align-items:center; padding:4px 0; font-size:12px; }
    .vote-badge { font-size:11px; padding:2px 8px; border-radius:10px; }
    .vote-badge.pass { background:#2a4a2a; color:#8ac88a; }
    .vote-badge.fail { background:#4a2a2a; color:#c88a8a; }
    .waiting-notice { background:#2a2a1a; border:1px solid #5a5a2a; border-radius:12px; padding:10px; color:#c8c860; font-size:13px; text-align:center; margin-top:8px; }
    .hidden-rules { filter:blur(5px); user-select:none; pointer-events:none; }
    .hidden-rules.revealed { filter:none; user-select:auto; pointer-events:auto; }
    .vote-detail-row { display:flex; justify-content:space-between; align-items:center; padding:6px 8px; border-bottom:1px solid #1e2a34; font-size:12px; }
    .vote-detail-row:last-child { border-bottom:none; }
    .final-score { text-align:center; font-size:1.3em; font-weight:bold; padding:12px; background:#1a2838; border-radius:12px; margin:8px 0; }
    .winner-badge { text-align:center; font-size:1.2em; padding:8px; background:#2a3a1a; border:2px solid #c49b4a; border-radius:12px; margin:8px 0; color:#e0d0a0; }
    .checkbox-label { display:flex; align-items:center; gap:6px; font-size:13px; background:#1a2632; border-radius:8px; padding:8px 12px; cursor:pointer; border:1px solid #2e4456; }
    .checkbox-label input { width:auto; margin:0; }
    .checkbox-label.checked { border-color:#c49b4a; background:#2a3020; }
    .info-text { font-size:11px; color:#8a9a6a; margin-top:2px; }
  </style>
</head>
<body>
<div id="app">
  <div id="loginScreen" class="screen active">
    <h2>🧩 逻辑拼图</h2>
    <input type="text" id="nicknameInput" placeholder="输入昵称">
    <input type="text" id="roomIdInput" placeholder="房间号 (留空创建)">
    <button id="joinBtn">进入房间</button>
    <div style="text-align:center;font-size:12px;color:#6a8a9a;">2-6人 · 逻辑对抗 · 支持人机补位</div>
  </div>

  <div id="gameScreen" class="screen">
    <div class="phase-badge" id="phaseDisplay">等待中...</div>
    <div style="display:flex;justify-content:space-between;font-size:13px;">
      <span>🏠 <strong id="roomCode"></strong></span>
      <span id="playerCount">👥 0人</span>
    </div>
    <div class="player-list" id="playersList"></div>

    <div id="hostControls" style="display:none;">
      <button id="startGameBtn" class="gold">▶ 开始游戏</button>
      <div class="bot-panel" style="margin-top:8px;">
        <div style="font-size:12px;color:#8a9a6a;margin-bottom:6px;">🤖 人机设置</div>
        <div class="btn-row">
          <button id="addOneBot" class="bot-btn">+1人机</button>
          <button id="addTwoBots" class="bot-btn">+2人机</button>
          <button id="addThreeBots" class="bot-btn">+3人机</button>
          <button id="removeBotsBtn" class="danger" style="font-size:13px;">清除</button>
        </div>
        <div id="botCountDisplay" style="font-size:11px;color:#6a7a8a;margin-top:4px;text-align:center;">当前人机: 0</div>
      </div>
    </div>

    <div id="readingPhase" style="display:none;" class="card">
      <h3>📖 你的规则手册</h3>
      <div id="caseInfo"></div>
      <div id="falseWarning" class="warning-badge" style="display:none;">⚠️ 你手中的规则有一条是假的！但你不知道是哪一条。</div>
      <div id="yourRulesList"></div>
      <button id="readyToStatementBtn" class="success" style="margin-top:8px;">我已阅读完毕</button>
      <div id="readingStatus" style="font-size:12px;color:#8a9a6a;text-align:center;margin-top:4px;"></div>
    </div>

    <div id="statementPhase" style="display:none;" class="card">
      <h3>📢 选择一条规则提交</h3>
      <div class="my-rules-board">
        <div class="collapsible-header" onclick="toggleCollapse('statementMyRulesBody', this)"><span>📋 我持有的规则</span><span class="arrow open" id="statementMyRulesArrow">▼</span></div>
        <div class="collapsible-body" id="statementMyRulesBody"><div id="statementMyRulesContent"></div></div>
      </div>
      <div style="font-size:12px;color:#c8c860;margin-top:4px;">⚠️ 所有人提交后规则才会公布</div>
      <div id="statementRulesList"></div>
      <div id="statementStatus" style="color:#8a9a6a;font-size:13px;margin-top:4px;"></div>
      <div id="statementWaitingNotice" class="waiting-notice" style="display:none;">⏳ 等待其他玩家提交规则...</div>
      <div class="statement-board hidden-rules" id="statementBoard" style="display:none;"><strong>📢 已公开的规则：</strong><div id="statementEntries"></div></div>
    </div>

    <div id="discussPhase" style="display:none;" class="card">
      <h3>💬 自由讨论</h3>
      <div class="my-rules-board">
        <div class="collapsible-header" onclick="toggleCollapse('discussMyRulesBody', this)"><span>📋 我持有的规则</span><span class="arrow open" id="discussMyRulesArrow">▼</span></div>
        <div class="collapsible-body" id="discussMyRulesBody"><div id="discussMyRulesContent"></div></div>
      </div>
      <div class="statement-board" id="discussStatementBoard" style="display:none;"><strong>📢 已公开的规则：</strong><div id="discussStatementEntries"></div></div>
      <div class="messages" id="chatMessages"></div>
      <div class="btn-row">
        <input type="text" id="chatInput" placeholder="发表推理..."><button id="sendChatBtn" style="width:auto;">发送</button>
      </div>
      <button id="readyToAccusationBtn" class="success">我准备好了，进入指控</button>
      <button id="forceAccusationBtn" class="danger" style="display:none;">⏰ 强制推进(房主)</button>
      <div id="discussProgress" style="font-size:12px;color:#8a9a6a;text-align:center;"></div>
    </div>

    <div id="accusationPhase" style="display:none;" class="card">
      <h3>⚖️ 最终指控</h3>
      <div><label>谁持有假规则？（可多选）</label>
        <div id="falsePlayerCheckboxes" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;"></div>
        <div id="falseCountHint" class="info-text"></div>
      </div>
      <div style="margin-top:8px;"><label>凶手是谁？</label><select id="murdererSelect"></select></div>
      <button id="submitAccusationBtn" class="danger" style="margin-top:8px;">提交指控</button>
      <div id="accusationStatus" style="font-size:13px;color:#8a9a6a;text-align:center;"></div>
      <div id="accusationWaitingNotice" class="waiting-notice" style="display:none;">⏳ 等待其他玩家提交指控...</div>
      <div class="vote-stats hidden-rules" id="voteStats" style="display:none;"><strong>📊 投票结果</strong><div id="voteStatsContent"></div></div>
    </div>

    <div id="resultPhase" style="display:none;" class="card">
      <h3>🏆 游戏结果</h3>
      <div id="resultContent"></div>
      <button id="backToLobbyBtn" style="margin-top:8px;">返回大厅</button>
    </div>

    <button id="leaveRoomBtn" class="danger">🚪 离开房间</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  const state = { roomId:'', playerId:'', isHost:false, phase:'lobby', players:[], myRules:[], hasFalseRule:false, suspects:[], currentStatements:[], botCount:0, hasSubmittedStatement:false, hasSubmittedAccusation:false, totalPlayers:0, falseRuleCount:0 };

  const $ = id => document.getElementById(id);

  function setPhase(phase, msg) {
    state.phase = phase;
    $('phaseDisplay').textContent = msg || phase;
    ['readingPhase','statementPhase','discussPhase','accusationPhase','resultPhase'].forEach(p => $(p).style.display='none');
    $('forceAccusationBtn').style.display = 'none';
    updateHostUI();
    if (phase==='lobby') { /* 大厅状态 */ }
    if (phase==='reading') $('readingPhase').style.display='block';
    if (phase==='statement') $('statementPhase').style.display='block';
    if (phase==='discuss') $('discussPhase').style.display='block';
    if (phase==='accusation') $('accusationPhase').style.display='block';
    if (phase==='result') $('resultPhase').style.display='block';
  }

  function updateHostUI() {
    const show = state.isHost && state.phase === 'lobby';
    $('hostControls').style.display = show ? 'block' : 'none';
  }

  function addChat(msg, sys) {
    const d = document.createElement('div'); d.className = 'msg' + (sys?' system':'');
    d.textContent = msg; $('chatMessages').appendChild(d);
    $('chatMessages').scrollTop = $('chatMessages').scrollHeight;
  }
  function clearChat() { $('chatMessages').innerHTML = ''; }

  function renderStatementBoard(statements, targetId) {
    const c = $(targetId); if (!c) return;
    c.innerHTML = statements.map(s => `<div class="statement-entry"><strong>${s.nickname}:</strong> "${s.rule}"</div>`).join('');
  }

  function renderMyRules(targetId) {
    const c = $(targetId); if (!c || !state.myRules.length) return;
    c.innerHTML = state.myRules.map(r => `<span class="my-rule-tag">📌 ${r.rule}</span>`).join('');
  }

  function toggleCollapse(bodyId, headerEl) {
    const body = document.getElementById(bodyId), arrow = headerEl.querySelector('.arrow');
    if (body.style.display === 'none') { body.style.display = 'block'; if (arrow) arrow.classList.add('open'); }
    else { body.style.display = 'none'; if (arrow) arrow.classList.remove('open'); }
  }
  window.toggleCollapse = toggleCollapse;

  function resetAllState() {
    state.currentStatements = []; state.hasFalseRule = false; state.hasSubmittedStatement = false;
    state.hasSubmittedAccusation = false; state.totalPlayers = 0; state.falseRuleCount = 0; state.myRules = [];
    $('falseWarning').style.display = 'none'; $('statementBoard').style.display = 'none';
    $('statementBoard').classList.add('hidden-rules'); $('voteStats').style.display = 'none';
    $('voteStats').classList.add('hidden-rules'); $('statementWaitingNotice').style.display = 'none';
    $('accusationWaitingNotice').style.display = 'none'; $('falseCountHint').textContent = '';
  }

  function updatePlayers(players) {
    state.players = players;
    state.botCount = players.filter(p => p.isBot).length;
    state.totalPlayers = players.length;
    $('playerCount').textContent = `👥 ${players.length}人`;
    $('playersList').innerHTML = players.map(p => 
      `<span class="player-badge ${p.isBot ? 'bot' : ''}">${p.nickname}${p.isBot ? ' 🤖' : ''}${p.isHost?' 👑':''}${p.id===state.playerId?' (你)':''}</span>`
    ).join('');
    const me = players.find(p => p.id===state.playerId);
    state.isHost = me?.isHost || false;
    updateHostUI();
    $('botCountDisplay').textContent = `当前人机: ${state.botCount}`;
    if (state.phase === 'accusation') {
      const checkboxesHtml = players.filter(p => p.id !== state.playerId).map(p => 
        `<label class="checkbox-label" data-id="${p.id}"><input type="checkbox" value="${p.id}" class="false-checkbox" onchange="updateCheckboxStyle(this)"> ${p.nickname}${p.isBot ? ' 🤖' : ''}</label>`
      ).join('');
      $('falsePlayerCheckboxes').innerHTML = checkboxesHtml;
      if (state.falseRuleCount > 0) $('falseCountHint').textContent = `提示：本轮有 ${state.falseRuleCount} 位假规则持有者，请选择 ${state.falseRuleCount} 位`;
    }
  }

  window.updateCheckboxStyle = function(cb) { cb.parentElement.classList.toggle('checked', cb.checked); };

  function resetUIState() {
    state.hasSubmittedStatement = false; state.hasSubmittedAccusation = false;
    $('readyToStatementBtn').disabled = false; $('readyToStatementBtn').textContent = '我已阅读完毕';
    $('submitAccusationBtn').disabled = false; $('submitAccusationBtn').textContent = '提交指控';
    $('readingStatus').textContent = ''; $('statementStatus').textContent = '';
    $('accusationStatus').textContent = ''; $('discussProgress').textContent = '';
    $('forceAccusationBtn').style.display = 'none'; $('readyToAccusationBtn').disabled = false;
    $('readyToAccusationBtn').textContent = '我准备好了，进入指控';
    $('statementBoard').style.display = 'none'; $('statementBoard').classList.add('hidden-rules');
    $('discussStatementBoard').style.display = 'none'; $('voteStats').style.display = 'none';
    $('voteStats').classList.add('hidden-rules'); $('statementWaitingNotice').style.display = 'none';
    $('accusationWaitingNotice').style.display = 'none';
    document.querySelectorAll('#statementRulesList .rule-item').forEach(el => el.classList.remove('selected','submitted'));
  }

  socket.on('roomJoined', ({ roomId, playerId, players, phase, isHost }) => {
    state.roomId = roomId; state.playerId = playerId; state.isHost = isHost;
    $('roomCode').textContent = roomId; updatePlayers(players);
    document.getElementById('loginScreen').classList.remove('active');
    document.getElementById('gameScreen').classList.add('active');
    clearChat(); resetAllState(); setPhase(phase);
  });

  socket.on('playerListUpdate', updatePlayers);

  socket.on('phaseChange', ({ phase, message, suspectList, players, statements, totalPlayers, falseCount }) => {
    if (phase === 'lobby') {
      setPhase('lobby', message || '等待房主开始...');
      resetAllState();
      clearChat();
      if (players) updatePlayers(players);
      return;
    }
    setPhase(phase, message);
    if (suspectList) { state.suspects = suspectList; $('murdererSelect').innerHTML = suspectList.map(s => `<option value="${s}">${s}</option>`).join(''); }
    if (players) updatePlayers(players);
    if (totalPlayers) state.totalPlayers = totalPlayers;
    if (falseCount !== undefined) state.falseRuleCount = falseCount;
    resetUIState();
    if (phase === 'statement') { $('statementBoard').style.display = 'none'; $('statementBoard').classList.add('hidden-rules'); state.currentStatements = []; }
    if (phase === 'discuss') {
      clearChat(); addChat('[系统] 💬 讨论阶段开始。', true);
      if (statements?.length > 0) { state.currentStatements = statements; $('discussStatementBoard').style.display = 'block'; renderStatementBoard(statements, 'discussStatementEntries'); }
    }
    if (phase === 'reading') { clearChat(); state.currentStatements = []; state.hasSubmittedStatement = false; if (state.hasFalseRule) $('falseWarning').style.display = 'block'; }
    if (phase === 'accusation') { state.hasSubmittedAccusation = false; $('voteStats').style.display = 'none'; $('voteStats').classList.add('hidden-rules'); $('accusationWaitingNotice').style.display = 'none'; }
    if (state.myRules.length > 0) { renderMyRules('statementMyRulesContent'); renderMyRules('discussMyRulesContent'); }
  });

  socket.on('yourRules', ({ rules, hasFalseRule, caseTitle, caseDescription, suspects }) => {
    state.myRules = rules; state.hasFalseRule = hasFalseRule || false; state.suspects = suspects;
    state.hasSubmittedStatement = false;
    $('caseInfo').innerHTML = `<strong>${caseTitle}</strong><br><small>${caseDescription}</small>`;
    $('yourRulesList').innerHTML = rules.map(r => `<div class="rule-item readonly">📌 ${r.rule}</div>`).join('');
    $('statementRulesList').innerHTML = rules.map((r,i) => `<div class="rule-item" data-index="${i}" onclick="selectRule(${i})">📌 ${r.rule}</div>`).join('');
    $('murdererSelect').innerHTML = suspects.map(s => `<option value="${s}">${s}</option>`).join('');
    $('readyToStatementBtn').disabled = false; $('readyToStatementBtn').textContent = '我已阅读完毕';
    $('falseWarning').style.display = state.hasFalseRule ? 'block' : 'none';
    renderMyRules('statementMyRulesContent'); renderMyRules('discussMyRulesContent');
  });

  socket.on('readyProgress', ({ ready, total }) => {
    $('readingStatus').textContent = `${ready}/${total} 人已确认`;
    $('discussProgress').textContent = `${ready}/${total} 人已确认`;
  });

  socket.on('statementSubmitProgress', ({ submitted, total }) => {
    $('statementStatus').textContent = `已提交: ${submitted}/${total}`;
    if (submitted < total) { $('statementWaitingNotice').style.display = 'block'; $('statementBoard').style.display = 'none'; }
  });

  socket.on('statementsRevealed', (statements) => {
    state.currentStatements = statements; $('statementWaitingNotice').style.display = 'none';
    $('statementBoard').style.display = 'block'; $('statementBoard').classList.remove('hidden-rules');
    renderStatementBoard(statements, 'statementEntries');
    $('statementStatus').textContent = '✅ 所有人已提交，规则已公布！';
    document.querySelectorAll('#statementRulesList .rule-item').forEach(el => el.classList.add('submitted'));
  });

  socket.on('chatMessage', ({ from, message }) => addChat(`${from}: ${message}`));

  socket.on('accusationUpdate', ({ submitted, total }) => {
    $('accusationStatus').textContent = `已提交: ${submitted}/${total}`;
    if (submitted < total) $('accusationWaitingNotice').style.display = 'block';
  });

  socket.on('accusationsRevealed', ({ falseVotes, murdererVotes, totalPlayers, majority }) => {
    $('accusationWaitingNotice').style.display = 'none'; $('voteStats').style.display = 'block'; $('voteStats').classList.remove('hidden-rules');
    let html = `<p style="font-size:12px;">✅ 所有人已提交！过半数=${majority}票</p>`;
    html += '<p style="margin-top:8px;"><strong>🔍 假规则持有者投票:</strong></p>';
    for (const [name, count] of Object.entries(falseVotes)) {
      const pct = totalPlayers > 0 ? Math.round(count / totalPlayers * 100) : 0, reached = count >= majority;
      html += `<div class="vote-result-row"><span>${name}</span><span>${count}票 ${reached ? '<span class="vote-badge pass">过半数</span>' : '<span class="vote-badge fail">未过半</span>'}</span></div>`;
      html += `<div class="vote-bar"><div class="vote-bar-fill ${reached ? 'majority' : ''}" style="width:${pct}%"></div></div>`;
    }
    html += '<p style="margin-top:10px;"><strong>🔪 凶手投票:</strong></p>';
    for (const [name, count] of Object.entries(murdererVotes)) {
      const pct = totalPlayers > 0 ? Math.round(count / totalPlayers * 100) : 0, reached = count >= majority;
      html += `<div class="vote-result-row"><span>${name}</span><span>${count}票 ${reached ? '<span class="vote-badge pass">过半数</span>' : '<span class="vote-badge fail">未过半</span>'}</span></div>`;
      html += `<div class="vote-bar"><div class="vote-bar-fill ${reached ? 'majority' : ''}" style="width:${pct}%"></div></div>`;
    }
    $('voteStatsContent').innerHTML = html;
  });

  socket.on('discussTimeout', () => { if (state.isHost) $('forceAccusationBtn').style.display = 'block'; addChat('[系统] ⏰ 讨论时间已到', true); });

  socket.on('gameResult', ({ falseHolders, realMurderer, goodScore, badScore, winner, reasoning, caseTitle, allPlayerRules, falseVotes, murdererVotes, majority, falseCorrect, murdererCorrect, voteDetails }) => {
    setPhase('result', '🏆 游戏结束');
    let vdHtml = '';
    if (voteDetails?.length > 0) {
      vdHtml = `<div class="vote-detail-board"><strong>🗳️ 每位玩家的投票：</strong>${voteDetails.map(v => `<div class="vote-detail-row"><span>${v.nickname}${v.isBot?' 🤖':''}</span><span>假→${v.votedFalsePlayer} | 凶→${v.votedMurderer}</span></div>`).join('')}</div>`;
    }
    let vHtml = '';
    if (falseVotes && murdererVotes) {
      vHtml = `<div class="vote-result-board"><strong>📊 投票汇总 (过半数=${majority}票)</strong>
        <p style="margin-top:6px;">🔍 假规则: ${falseCorrect ? '<span class="correct">✅正确</span>' : '<span class="wrong">❌错误</span>'} (实际: ${falseHolders.join(', ')})</p>
        <p>🔪 凶手: ${murdererCorrect ? '<span class="correct">✅正确</span>' : '<span class="wrong">❌错误</span>'} (实际: ${realMurderer})</p>
        <p style="font-size:11px;color:#8a9a6a;">每项过半数正确→正方+1，否则反方+1</p></div>`;
    }
    let arHtml = '';
    if (allPlayerRules?.length > 0) {
      arHtml = `<div class="statement-board"><strong>📋 所有规则：</strong>${allPlayerRules.map(p => `<div class="player-rules-card ${p.hasFalse?'false-holder':''}"><div style="font-weight:bold;">${p.nickname} ${p.hasFalse?'🔴假':'🟢真'}</div>${p.rules.map(r => `<div class="rule-detail ${r.isTrue?'true':'false'}">${r.isTrue?'✅':'❌'} ${r.rule}</div>`).join('')}</div>`).join('')}</div>`;
    }
    $('resultContent').innerHTML = `<h4>${caseTitle}</h4>${vdHtml}${vHtml}${arHtml}<div class="final-score">正方 ${goodScore} : ${badScore} 反方</div><div class="winner-badge">🏆 ${winner} 获胜！</div><details><summary>推理链</summary><p>${reasoning}</p></details>`;
  });

  socket.on('errorMessage', msg => alert(msg));

  $('joinBtn').addEventListener('click', () => {
    const n = $('nicknameInput').value.trim(); if (!n) return alert('输入昵称');
    socket.emit('joinRoom', { nickname: n, roomId: $('roomIdInput').value.trim() || null });
  });
  $('nicknameInput').addEventListener('keypress', e => { if (e.key==='Enter') $('joinBtn').click(); });
  $('startGameBtn').addEventListener('click', () => { if (state.players.length < 2) return alert('至少2人'); socket.emit('startGame', { roomId: state.roomId }); });
  $('addOneBot').addEventListener('click', () => socket.emit('addBots', { roomId: state.roomId, count: 1 }));
  $('addTwoBots').addEventListener('click', () => socket.emit('addBots', { roomId: state.roomId, count: 2 }));
  $('addThreeBots').addEventListener('click', () => socket.emit('addBots', { roomId: state.roomId, count: 3 }));
  $('removeBotsBtn').addEventListener('click', () => socket.emit('removeBots', { roomId: state.roomId }));

  $('readyToStatementBtn').addEventListener('click', function() { if (this.disabled) return; this.disabled = true; this.textContent = '等待...'; socket.emit('readyToStatement', { roomId: state.roomId }); });

  window.selectRule = function(i) {
    if (state.hasSubmittedStatement) return;
    state.hasSubmittedStatement = true;
    document.querySelectorAll('#statementRulesList .rule-item').forEach((el,j) => { el.classList.toggle('selected', j===i); el.classList.add('submitted'); });
    socket.emit('submitStatement', { roomId: state.roomId, rule: state.myRules[i].rule });
    $('statementStatus').textContent = '已提交，等待其他人...'; $('statementWaitingNotice').style.display = 'block';
  };

  $('sendChatBtn').addEventListener('click', () => { const m = $('chatInput').value.trim(); if (!m) return; socket.emit('chatMessage', { roomId: state.roomId, message: m }); $('chatInput').value = ''; });
  $('chatInput').addEventListener('keypress', e => { if (e.key==='Enter') $('sendChatBtn').click(); });
  $('readyToAccusationBtn').addEventListener('click', function() { if (this.disabled) return; this.disabled = true; this.textContent = '等待...'; socket.emit('readyToAccusation', { roomId: state.roomId }); });
  $('forceAccusationBtn').addEventListener('click', () => socket.emit('forceAccusation', { roomId: state.roomId }));

  $('submitAccusationBtn').addEventListener('click', function() {
    if (state.hasSubmittedAccusation) return;
    const checkedBoxes = document.querySelectorAll('.false-checkbox:checked');
    const falsePlayerIds = Array.from(checkedBoxes).map(cb => cb.value);
    if (falsePlayerIds.length === 0) return alert('请至少选择一位假规则持有者');
    const mg = $('murdererSelect').value; if (!mg) return alert('请选择凶手');
    this.disabled = true; this.textContent = '已提交'; state.hasSubmittedAccusation = true;
    socket.emit('submitAccusation', { roomId: state.roomId, falsePlayerIds, murdererGuess: mg });
    $('accusationStatus').textContent = '已提交，等待其他人...'; $('accusationWaitingNotice').style.display = 'block';
  });

  $('backToLobbyBtn').addEventListener('click', () => {
    socket.emit('returnToLobby', { roomId: state.roomId });
    clearChat();
    resetAllState();
  });

  $('leaveRoomBtn').addEventListener('click', () => {
    socket.emit('leaveRoom', { roomId: state.roomId });
    document.getElementById('gameScreen').classList.remove('active');
    document.getElementById('loginScreen').classList.add('active');
    clearChat(); resetAllState();
  });
</script>
</body>
</html>
